services:
  # ── Backend Web Service (FastAPI) ──────────────────────────────
  - type: web
    name: blogverse-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blogverse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend Static Site (React/Vite) ──────────────────────────
  - type: web
    name: blogverse-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blogverse-api
          property: host
