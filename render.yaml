services:
  # ── Backend Web Service (FastAPI) ──────────────────────────────
  - type: web
    name: blogverse-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blogverse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        value: blogversebusiness@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: blogversebusiness@gmail.com
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://blogverse.info
      - key: DEBUG
        value: "False"

  # ── Frontend Static Site (React/Vite) ──────────────────────────
  - type: web
    name: blogverse-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blogverse-api
          property: host
    routes:
      - type: redirect
        source: /sitemap.xml
        destination: https://blogverse-api-ssvc.onrender.com/api/sitemap.xml
      - type: rewrite
        source: /*
        destination: /index.html

# ── Database (PostgreSQL) ────────────────────────────────────────
databases:
  - name: blogverse-db
    plan: free
